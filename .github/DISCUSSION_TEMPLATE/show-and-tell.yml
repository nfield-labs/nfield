title: "[Show & Tell]: "
labels: ["show-and-tell"]
body:
  - type: markdown
    attributes:
      value: |
        ## Welcome to Show & Tell!

        This is a space to share projects, experiments, and workflows that use FormatShield.
        Whether you built a research prototype, integrated FormatShield into a production pipeline,
        or discovered an interesting property of the TTF engine — we'd love to hear about it!

  - type: input
    id: project_name
    attributes:
      label: Project / Integration Name
      description: What did you build?
      placeholder: "e.g. DocQA Pipeline with FormatShield Guard, CRANE Benchmark Reproduction"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: |
        Tell us about your project. What problem does it solve? What does it do?
        Feel free to include architecture diagrams, code snippets, or links to a repo.
      placeholder: |
        I built a retrieval-augmented Q&A system that wraps every LLM call with
        FormatShield's ThresholdOracle to enforce structured JSON output.
        The system serves 50+ daily users at our research lab ...
    validations:
      required: true

  - type: textarea
    id: how_formatshield_helped
    attributes:
      label: How FormatShield Helped
      description: |
        What specific FormatShield features did you use, and what impact did they have?
        Quantitative results (latency, format compliance rate, error reduction) are very welcome.
      placeholder: |
        - Used `ComplexityScorer` to route simple prompts to a cheaper model, saving ~30% on API costs.
        - `ThresholdOracle` reduced format-violation errors from 12% to under 1%.
        - The LangChain integration let us drop FormatShield in with two lines of code.
    validations:
      required: true

  - type: input
    id: link
    attributes:
      label: Link (optional)
      description: A GitHub repo, blog post, paper, demo, or any public resource related to your project.
      placeholder: "https://github.com/yourname/yourproject"
    validations:
      required: false

  - type: dropdown
    id: backend_used
    attributes:
      label: Primary Backend Used
      options:
        - openai
        - anthropic
        - google-gemini
        - cohere
        - mistral
        - ollama (local)
        - multiple backends
        - other / custom
    validations:
      required: false

  - type: checkboxes
    id: consent
    attributes:
      label: Sharing Consent
      options:
        - label: I am happy for this project to be highlighted in FormatShield's README or release notes.
          required: false
