name: Security

on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  bandit:
    name: Static Security Analysis (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install bandit
        run: uv tool install bandit[toml]

      - name: Run bandit
        run: uv tool run bandit -r src/ -ll -f json -o bandit-report.json || true

      - name: Display bandit summary
        run: |
          if [ -f bandit-report.json ]; then
            python - <<'PY'
          import json, sys
          with open("bandit-report.json") as f:
              report = json.load(f)
          results = report.get("results", [])
          print(f"Bandit scan complete.")
          print(f"  Issues found : {len(results)}")
          for sev in ("HIGH", "MEDIUM", "LOW"):
              count = sum(1 for r in results if r.get("issue_severity") == sev)
              if count:
                  print(f"  {sev:8s}: {count}")
          high = sum(1 for r in results if r.get("issue_severity") == "HIGH")
          if high:
              print("FAIL: HIGH severity issues found.")
              sys.exit(1)
          PY
          else
            echo "bandit-report.json not found — scan may have failed"
          fi

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
          if-no-files-found: warn
          retention-days: 30

  pip-audit:
    name: Dependency Vulnerability Audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install project dependencies
        run: uv sync --extra dev

      - name: Install pip-audit
        run: uv tool install pip-audit

      - name: Run pip-audit
        run: uv tool run pip-audit --format json --output pip-audit-report.json || true

      - name: Display pip-audit summary
        run: |
          if [ -f pip-audit-report.json ]; then
            python - <<'PY'
          import json, sys
          with open("pip-audit-report.json") as f:
              report = json.load(f)
          vulns = [dep for dep in report.get("dependencies", []) if dep.get("vulns")]
          print(f"pip-audit scan complete.")
          print(f"  Vulnerable packages: {len(vulns)}")
          for dep in vulns:
              for v in dep.get("vulns", []):
                  print(f"  {dep['name']}=={dep['version']}  {v['id']}: {v['description'][:80]}")
          if vulns:
              sys.exit(1)
          PY
          else
            echo "pip-audit-report.json not found — scan may have failed"
          fi

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json
          if-no-files-found: warn
          retention-days: 30
