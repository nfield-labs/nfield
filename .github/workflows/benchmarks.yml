name: Benchmarks

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install FormatShield with dev dependencies
        run: uv sync --extra dev

      - name: Run benchmark smoke test
        id: benchmark
        run: |
          set -e
          OUTPUT=$(uv run formatshield benchmark --tasks gsm --backends dryrun --quick 2>&1)
          echo "$OUTPUT"
          echo "benchmark_output<<EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Post benchmark results as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `${{ steps.benchmark.outputs.benchmark_output }}`;
            const body = [
              "## Benchmark Results (dry-run)",
              "",
              "```",
              output,
              "```",
              "",
              `_Triggered by commit ${context.sha.slice(0, 7)} on \`${context.ref}\`_`,
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
