name: Oracle Lanes

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lane-a-deterministic:
    name: Lane A – Deterministic Oracle Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --python 3.11 --extra dev

      - name: Unit tests — Oracle and Φ routing
        run: |
          uv run pytest \
            tests/unit/test_context.py \
            tests/unit/test_oracle_x.py \
            tests/unit/test_schema_graph.py \
            tests/unit/test_schema_entropy.py \
            tests/unit/test_ncd.py \
            tests/unit/test_routing_score.py \
            -q --tb=short

  lane-b-oracle-smoke:
    name: Lane B – Oracle Smoke (always synthetic, always deterministic)
    runs-on: ubuntu-latest
    needs: lane-a-deterministic
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --python 3.11 --extra dev

      - name: OracleX Φ-routing smoke test
        run: |
          uv run python - <<'EOF'
          from formatshield.oracle.oracle_x import OracleX
          from formatshield.oracle.context import RoutingContext
          from formatshield.oracle.routing_score import compute_routing_score
          from formatshield.scorer.features import ComplexityFeatures
          import hashlib

          oracle = OracleX()

          simple_schema = {
              "type": "object",
              "properties": {
                  "name": {"type": "string"},
                  "age": {"type": "integer"},
              },
          }
          complex_schema = {
              "type": "object",
              "properties": {
                  "itinerary": {
                      "type": "array",
                      "items": {
                          "type": "object",
                          "properties": {
                              "day": {"type": "integer"},
                              "hotel": {"type": "object"},
                              "total_cost": {"type": "number"},
                          },
                      },
                  }
              },
          }

          for label, prompt, schema in [
              ("simple", "Extract name and age from: John 34", simple_schema),
              ("complex", "Plan a 10-day European trip with budget 8000", complex_schema),
          ]:
              phi = compute_routing_score(prompt, schema)
              features = ComplexityFeatures(
                  token_entropy=0.5, schema_depth=2, required_reasoning_ops=1,
                  instruction_tune_score=0.6, prompt_length_bucket=1, schema_constraint_count=3,
              )
              prompt_id = hashlib.sha256(prompt.encode()).hexdigest()[:12]
              ctx = RoutingContext(
                  backend_id="groq", model_id="llama-3.1-8b-instant",
                  task_id="smoke", schema_family="extraction", prompt_id=prompt_id,
                  phi_score=phi.phi, phi_lambda2=phi.lambda2,
                  phi_tau=phi.tau, phi_delta_k=phi.delta_k,
              )
              decision = oracle.predict(features, backend="groq", model_id="llama-3.1-8b-instant", context=ctx)
              assert decision.strategy in {"ttf", "direct"}, f"Unexpected strategy: {decision.strategy}"
              print(f"[{label}] Φ={phi.phi:.3f} strategy={decision.strategy}")

          print("OracleX Φ-routing smoke: PASS")
          EOF
