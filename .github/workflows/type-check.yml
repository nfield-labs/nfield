name: Type Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pyright:
    name: pyright (standard mode)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install project with dev dependencies
        run: uv sync --extra dev

      - name: Run pyright
        run: |
          uv run pyright src/ --outputjson > pyright-report.json 2>/dev/null || true
          # Ensure we always have a valid JSON file for the summary step
          python -c "
          import json, sys
          try:
              with open('pyright-report.json') as f:
                  json.load(f)
          except Exception:
              with open('pyright-report.json', 'w') as f:
                  json.dump({'generalDiagnostics': [], 'summary': {'errorCount': 0, 'warningCount': 0, 'informationCount': 0}}, f)
          "

      - name: Summarise pyright results
        run: |
          python - <<'PY'
          import json, sys
          with open("pyright-report.json") as f:
              report = json.load(f)
          summary = report.get("summary", {})
          errors   = summary.get("errorCount", 0)
          warnings = summary.get("warningCount", 0)
          info     = summary.get("informationCount", 0)
          print(f"pyright summary — errors: {errors}, warnings: {warnings}, info: {info}")
          for diag in report.get("generalDiagnostics", []):
              sev = diag.get("severity", "")
              msg = diag.get("message", "")
              rng = diag.get("range", {})
              start = rng.get("start", {})
              file_ = diag.get("file", "")
              line  = start.get("line", 0) + 1
              print(f"  [{sev.upper()}] {file_}:{line}: {msg}")
          # Informational only — does not block CI
          if errors:
              print(f"::warning::pyright found {errors} error(s) — see report above")
          PY

      - name: Upload pyright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pyright-report
          path: pyright-report.json
          if-no-files-found: warn
          retention-days: 14
