site_name: FormatShield
site_url: https://formatshield.github.io/formatshield/
site_description: >-
  Stop losing 15–30% LLM accuracy to JSON constraints.
  Route automatically with Think-Then-Format. Measure everything.
site_author: FormatShield Contributors
repo_url: https://github.com/formatshield/formatshield
repo_name: formatshield/formatshield
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2026 FormatShield Contributors

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.suggest
    - search.highlight
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/formatshield/formatshield
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/formatshield/
    - icon: fontawesome/solid/graduation-cap
      link: https://arxiv.org/abs/2502.09061

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Tutorials:
    - Overview: tutorials/index.md
    - 01 · Basic Generation: tutorials/01-basic-generation.md
    - 02 · Smart Routing: tutorials/02-routing.md
    - 03 · Benchmarking: tutorials/03-benchmarking.md
    - 04 · Backends: tutorials/04-backends.md
    - 05 · Streaming: tutorials/05-streaming.md
    - 06 · LangChain: tutorials/06-langchain.md
    - 07 · Observability: tutorials/07-observability.md
    - 08 · Contributing a Backend: tutorials/08-contributing.md
  - Explanation:
    - The Format Tax: explanation/format-tax.md
    - Routing Algorithm: explanation/routing-algorithm.md
    - TTF Algorithm: explanation/ttf-algorithm.md
    - When TTF Hurts: explanation/when-ttf-hurts.md
  - Reference:
    - Core API: reference/core.md
    - Backends: reference/backends.md
    - ComplexityScorer: reference/scorer.md
    - ThresholdOracle: reference/oracle.md
    - TTF Engine: reference/ttf.md
    - BenchmarkHarness: reference/benchmark.md
    - StreamingEngine: reference/streaming.md
    - CLI: reference/cli.md
  - Changelog: changelog.md

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: On this page
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra_css:
  - stylesheets/extra.css
