site_name: FormatShield
site_url: https://formatshield.github.io/formatshield/
site_description: Route LLM outputs intelligently. Measure what structured generation costs you.
repo_url: https://github.com/formatshield/formatshield
repo_name: formatshield/formatshield
theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Tutorials:
    - 01 - Basic Generation: tutorials/01-basic-generation.md
    - 02 - Routing: tutorials/02-routing.md
    - 03 - Benchmarking: tutorials/03-benchmarking.md
    - 04 - Backends: tutorials/04-backends.md
    - 05 - Streaming: tutorials/05-streaming.md
    - 06 - LangChain: tutorials/06-langchain.md
    - 07 - Observability: tutorials/07-observability.md
    - 08 - Contributing a Backend: tutorials/08-contributing.md
  - Reference:
    - Core: reference/core.md
    - Backends: reference/backends.md
    - ComplexityScorer: reference/scorer.md
    - ThresholdOracle: reference/oracle.md
    - TTF Engine: reference/ttf.md
    - BenchmarkHarness: reference/benchmark.md
    - CLI: reference/cli.md
    - Streaming: reference/streaming.md
  - Explanation:
    - The Format Tax: explanation/format-tax.md
    - Routing Algorithm: explanation/routing-algorithm.md
    - TTF Algorithm: explanation/ttf-algorithm.md
    - When TTF Hurts: explanation/when-ttf-hurts.md
  - Changelog: changelog.md
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - footnotes
  - toc:
      permalink: true
