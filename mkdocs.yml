site_name: NField
site_description: N-field structured extraction from documents with LLMs.
repo_url: https://github.com/nfield-labs/nfield
repo_name: nfield-labs/nfield

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
  palette:
    - scheme: default
      primary: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Getting started:
      - Quickstart: quickstart.md
      - Configuration: configuration.md
      - Examples: examples.md
  - Guides:
      - CLI: cli.md
      - Errors and troubleshooting: errors.md
  - Concepts:
      - Pipeline: concepts/pipeline.md
      - SFEP: concepts/sfep.md
  - Reference:
      - Python API: api/nfield.md

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - toc:
      permalink: true

plugins:
  - search
