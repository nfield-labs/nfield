[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "formatshield"
version = "0.0.1"
description = "Route LLM outputs intelligently. Measure what structured generation costs you."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
keywords = [
    "structured-output",
    "llm-inference",
    "constrained-decoding",
    "think-then-format",
    "ttf",
    "format-tax",
    "routing",
    "accuracy",
    "vllm",
    "outlines",
    "groq",
    "pydantic",
    "async",
    "benchmark",
    "langchain",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
dependencies = [
    "pydantic>=2.6.0",
    "anyio>=4.3.0",
    "tiktoken>=0.7.0",

    "typer>=0.12.0",
    "groq>=0.5.0",
    "ollama>=0.1.0",
    "openai>=1.0.0",
    "anthropic>=0.20.0",
    "numpy>=1.26.0",
    "rich>=13.0.0",
    "python-dotenv>=1.0.0",
    "diskcache>=5.6.3",
]

[project.optional-dependencies]
openai = ["openai>=1.0.0"]
anthropic = ["anthropic>=0.20.0"]
cohere = ["cohere>=5.0.0"]
mistral = ["mistralai>=1.0.0"]
fireworks = ["openai>=1.0.0"]  # FireworksBackend uses openai SDK with custom base_url
together = ["openai>=1.0.0"]  # TogetherBackend uses openai SDK with custom base_url
vllm = ["vllm>=0.4.0"]
gemini = ["google-generativeai>=0.8.0"]
sglang = ["openai>=1.0.0"]  # SGLangBackend uses openai SDK with custom base_url
transformers = ["transformers>=4.40.0", "torch>=2.0.0"]
llamacpp = ["llama-cpp-python>=0.2.0"]
bedrock = ["boto3>=1.34.0"]
vertexai = ["google-cloud-aiplatform>=1.50.0"]
cerebras = ["openai>=1.0.0"]  # CerebrasBackend uses openai SDK with custom base_url
outlines = ["outlines>=0.0.46"]
guidance = ["guidance>=0.1.0"]
cache = ["diskcache>=5.6.0", "cloudpickle>=3.0.0"]
prompting = ["jinja2>=3.1.0"]
dsl = []  # DSL types use stdlib only — no extra deps required
prometheus = ["prometheus-client>=0.17.0"]
otel = ["opentelemetry-api>=1.20.0", "opentelemetry-sdk>=1.20.0"]
batch = []  # Batch processor uses stdlib + core deps only
benchmark = [
    "matplotlib>=3.8.0",
    "seaborn>=0.13.0",
    "pandas>=2.0.0",
    "hypothesis>=6.100.0",
]
docs = [
    "mkdocs-material>=9.5.0",
    "mkdocstrings[python]>=0.25.0",
    "pymdown-extensions>=10.0",
]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=5.0.0",
    "hypothesis>=6.100.0",
    "ruff>=0.4.0",
    "pyright>=1.1.360",
    "pre-commit>=3.7.0",
    "bandit>=1.9.4",
]
all = ["formatshield[openai,anthropic,cohere,mistral,fireworks,together,vllm,outlines,guidance,cache,prompting,benchmark,docs,dev]"]

[project.scripts]
formatshield = "formatshield.cli:app"

[project.urls]
Homepage = "https://github.com/formatshield/formatshield"
Repository = "https://github.com/formatshield/formatshield"
Documentation = "https://formatshield.github.io/formatshield"
Issues = "https://github.com/formatshield/formatshield/issues"
Changelog = "https://github.com/formatshield/formatshield/blob/main/CHANGELOG.md"
"Bug Tracker" = "https://github.com/formatshield/formatshield/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/formatshield"]
include = ["src/formatshield/py.typed"]

[tool.ruff]
target-version = "py311"
line-length = 100
src = ["src"]
exclude = ["src/formatshield/backends/_pending", "tests/unit/_pending"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "N", "S", "B", "A", "C4", "PT", "RUF", "PIE"]
ignore = [
    "S101",   # assert in tests is fine
    "S105",   # hardcoded passwords - not applicable
    "N812",   # lowercase imported as non-lowercase
    "RUF001", # EN DASH / unicode in string literals — intentional range notation
    "RUF002", # EN DASH / unicode in docstrings — intentional range notation
    "RUF003", # EN DASH / unicode in comments — intentional range notation
    "A002",   # LangChain interface requires `input` parameter name
    "PT012",  # async generators must be iterated to trigger ImportError — no single-statement alternative
    "A005",   # formatshield.types is intentional — shadows stdlib types module by design
    "S701",   # Jinja2 autoescape=False intentional — prompts are plain text, not HTML/XML
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101", "S106", "S311", "S108"]  # S311: seeded RNG in tests is fine; S108: /tmp paths in tests are safe

[tool.pyright]
pythonVersion = "3.11"
typeCheckingMode = "standard"
include = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests", "rcocr/tests"]
asyncio_mode = "auto"
addopts = "-v --tb=short"
norecursedirs = ["_pending", ".git", "__pycache__", ".venv", "dist"]
markers = [
    "asyncio: async tests (auto-detected by pytest-asyncio)",
    "integration: requires live API keys — skipped in CI unless secrets set",
    "slow: test takes >2 seconds",
    "benchmark: runs the benchmark harness",
]

[tool.coverage.run]
source = ["src/formatshield"]
omit = ["tests/*", "src/formatshield/backends/_pending/*"]

[tool.coverage.report]
fail_under = 80
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if TYPE_CHECKING:",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "@(abc\\.)?abstractmethod",
]

[dependency-groups]
dev = [
    "bandit>=1.9.4",
    "mkdocs-material>=9.7.6",
    "mkdocstrings[python]>=1.0.3",
    "pymdown-extensions>=10.21.2",
]
