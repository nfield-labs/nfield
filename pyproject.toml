[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "formatshield"
version = "0.0.1"
description = "Route LLM outputs intelligently. Measure what structured generation costs you."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
keywords = [
    "structured-output",
    "llm-inference",
    "constrained-decoding",
    "vllm",
    "outlines",
    "pydantic",
    "async",
    "think-then-format",
    "ttf",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "pydantic>=2.6.0",
    "anyio>=4.3.0",
    "tiktoken>=0.7.0",
    "scikit-learn>=1.4.0",
    "joblib>=1.3.0",
    "typer>=0.12.0",
    "groq>=0.5.0",
    "ollama>=0.1.0",
    "openai>=1.0.0",
    "numpy>=1.26.0",
    "rich>=13.0.0",
    "python-dotenv>=1.0.0",
]

[project.optional-dependencies]
vllm = ["vllm>=0.4.0"]
outlines = ["outlines>=0.0.46"]
guidance = ["guidance>=0.1.0"]
benchmark = [
    "matplotlib>=3.8.0",
    "seaborn>=0.13.0",
    "pandas>=2.0.0",
    "hypothesis>=6.100.0",
]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=5.0.0",
    "hypothesis>=6.100.0",
    "ruff>=0.4.0",
    "pyright>=1.1.360",
    "pre-commit>=3.7.0",
]
all = ["formatshield[vllm,outlines,guidance,benchmark,dev]"]

[project.scripts]
formatshield = "formatshield.cli:app"

[project.urls]
Homepage = "https://github.com/formatshield/formatshield"
Repository = "https://github.com/formatshield/formatshield"
Documentation = "https://formatshield.github.io/formatshield"
Issues = "https://github.com/formatshield/formatshield/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/formatshield"]

[tool.ruff]
target-version = "py311"
line-length = 100
src = ["src"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "N", "S", "B", "A", "C4", "PT", "RUF"]
ignore = [
    "S101",   # assert in tests is fine
    "S105",   # hardcoded passwords - not applicable
    "N812",   # lowercase imported as non-lowercase
    "RUF001", # EN DASH / unicode in string literals — intentional range notation
    "RUF002", # EN DASH / unicode in docstrings — intentional range notation
    "RUF003", # EN DASH / unicode in comments — intentional range notation
    "A002",   # LangChain interface requires `input` parameter name
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101", "S106", "S311", "S108"]  # S311: seeded RNG in tests is fine; S108: /tmp paths in tests are safe

[tool.pyright]
pythonVersion = "3.11"
typeCheckingMode = "standard"
include = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "-v --tb=short"

[tool.coverage.run]
source = ["src/formatshield"]
omit = ["tests/*"]

[tool.coverage.report]
fail_under = 80
show_missing = true

[dependency-groups]
dev = [
    "bandit>=1.9.4",
]
